    <div class="chips">
      <div class="chip hot">SQLi</div>
      <div class="chip hot">XSS</div>

      <span class="dot red"></span>
      <span class="dot yellow"></span>

  <div class="footer">
    <div class="footer-brand"><span class="square"></span><span>WonderSuite</span></div>
