<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>WonderSuite — TikTok Slide Deck Preview</title>
<link rel="stylesheet" href="styles.css"/>
<style>
  body {
    background: #000;
    align-items: flex-start;
    padding: 40px;
    min-height: auto;
  }
  .header {
    width: min(96vw, 2600px);
    margin: 0 auto 24px;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--bg-1);
  }
  .header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .header .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--fg-muted);
    letter-spacing: 0.08em;
  }
  .header .accent { color: var(--accent); }
  .preview-grid {
    margin: 0 auto;
    --scale: 0.24;
  }
  .preview-grid .preview {
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .preview-grid .preview:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
  }
</style>
</head>
<body>

<div class="header">

</div>
