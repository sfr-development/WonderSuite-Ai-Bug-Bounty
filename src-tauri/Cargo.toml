[package]
name = "wondersuite"
version = "0.1.0"
description = "AI-Native Web Security Testing Platform"
authors = ["WonderSuite Team"]
edition = "2021"

[lib]
name = "wondersuite_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "native-tls", "socks"] }
tokio = { version = "1", features = ["full"] }
axum = "0.8"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
regex = "1"
# Proxy engine (pure Rust, no ring/aws-lc dependency)
native-tls = "0.2"
tokio-native-tls = "0.3"
httparse = "1"
dashmap = "6"
http = "1"
bytes = "1"
sha2 = "0.10"
sha1 = "0.10"
md5 = "0.7"
url = "2"
tokio-tungstenite = { version = "0.26", features = ["native-tls"] }
futures-util = "0.3"
lazy_static = "1"
base64 = "0.22"
urlencoding = "2"

