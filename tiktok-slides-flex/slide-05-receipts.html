<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>05 · Receipts</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="slide">
  <div class="brand-ribbon"><span class="dot"></span><span>Show me, don't tell me</span></div>

  <div style="margin-top: 60px;">
    <div class="kicker">The receipts</div>
    <div class="h2">Every module</div>
    <div class="h2"><span class="accent">your CTF needs.</span></div>
  </div>

  <div class="two-up">
    <div class="screen">
      <div class="window-chrome">
        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
        <span class="title">Scanner</span>
      </div>
      <img src="../docs/screenshots/scanner.png" alt="Scanner"/>
    </div>
    <div class="screen">
      <div class="window-chrome">
        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
        <span class="title">Intruder</span>
      </div>
      <img src="../docs/screenshots/intruder.png" alt="Intruder"/>
    </div>
  </div>

  <div class="two-up" style="margin-top: 22px;">
    <div class="screen">
      <div class="window-chrome">
        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
        <span class="title">OSINT</span>
      </div>
      <img src="../docs/screenshots/osint-dns.png" alt="OSINT"/>
    </div>
    <div class="screen">
      <div class="window-chrome">
        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
        <span class="title">Sitemap</span>
      </div>
      <img src="../docs/screenshots/sitemap-diagram.png" alt="Sitemap"/>
    </div>
  </div>

  <div class="footer">
    <div class="footer-brand"><span class="square"></span><span>WonderSuite</span></div>
    <div class="footer-page">05 / 6</div>
  </div>
</div>
</body>
</html>
