name: Bug Report
description: Something is broken or behaves unexpectedly.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the sections below — incomplete reports take longer to triage.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Include the actual behavior.
      placeholder: When I clicked X, the app did Y, but I expected Z.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: How can we reproduce this? Be specific — "click around in the proxy" is not enough.
      placeholder: |
        1. Open WonderSuite
        2. Go to ...
        3. Click ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (Ubuntu/Debian)
        - Linux (Arch)
        - Linux (Fedora)
        - Linux (other)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: WonderSuite version
      description: From Settings → General, or `Help → About`. If built from source, paste the commit SHA.
      placeholder: "0.1.0 or commit abc1234"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack traces
      description: Anything from DevTools console, the terminal where you ran `tauri dev`, or relevant log output. Wrap in code fences.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, the URL of the target you were testing against (if relevant and not sensitive), anything else useful.

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I'm using a recent version (latest release or `main`).
          required: true
