name: Feature Request
description: Suggest a new capability, MCP tool, or improvement.
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Great. Please describe the **problem** first, then your proposed solution. Solutions without problems tend to age badly.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can you not do today, or what's painful about how you do it?
      placeholder: When auditing GraphQL APIs I have to manually copy each operation into Repeater because there's no introspection-driven importer...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like to see this solved? Be specific — UI sketch, MCP tool signature, anything concrete.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you didn't pick them.

  - type: dropdown
    id: scope
    attributes:
      label: Where does this belong?
      multiple: true
      options:
        - Proxy engine
        - Scanner
        - Intruder / Fuzzer
        - MCP tool (new tool)
        - MCP tool (existing tool change)
        - Browser / CDP
        - OSINT
        - OAST
        - UI / UX
        - Build / Release
        - Documentation
        - Other

  - type: checkboxes
    id: willing
    attributes:
      label: Are you willing to implement this?
      options:
        - label: I'd be happy to send a PR (we'll help review).
        - label: I can help with testing once someone implements it.
