version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    ignore:
      # The whole pkcs/x509 stack is locked to the 0.7/0.9/0.2/0.10 line —
      # bumping any single crate splits the dep tree and breaks proxy/ca.rs.
      - dependency-name: "der"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pem-rfc7468"
        update-types: ["version-update:semver-major"]
      - dependency-name: "const-oid"
        update-types: ["version-update:semver-major"]
      - dependency-name: "spki"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pkcs1"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pkcs8"
        update-types: ["version-update:semver-major"]
      - dependency-name: "x509-cert"
        update-types: ["version-update:semver-major"]
      - dependency-name: "rsa"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      tauri-frontend:
        patterns:
          - "@tauri-apps/*"
      lint-and-types:
        patterns:
          - "typescript"
          - "@types/*"
          - "@vitejs/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
