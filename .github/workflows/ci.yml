name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Vite production build
        run: npx vite build

  rust:
    name: Rust (check + fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux deps for Tauri + boring-sys2 + pnet (libpcap-dev)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            nasm \
            cmake \
            clang \
            libclang-dev \
            libpcap-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml --locked --all-targets

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-targets -- -W clippy::all
