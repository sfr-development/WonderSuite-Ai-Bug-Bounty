name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        default: '0.1.0'
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.settings.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
          else
            RAW="${{ github.ref_name }}"
          fi
          # Strip an arbitrary number of leading 'v' (defends against both 'v0.1.1' and accidental 'vv0.1.1')
          VERSION="$RAW"
          while [[ "$VERSION" == v* ]]; do VERSION="${VERSION#v}"; done
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-].+)?$ ]]; then
            echo "::error::Resolved version '$VERSION' (from '$RAW') is not valid semver"
            exit 1
          fi
          echo "Using version: $VERSION (tag will be v$VERSION)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync version into manifests
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            for (const f of ["package.json", "src-tauri/tauri.conf.json"]) {
              const j = JSON.parse(fs.readFileSync(f, "utf-8"));
              j.version = v;
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + "\n");
            }
            const cargoPath = "src-tauri/Cargo.toml";
            let cargo = fs.readFileSync(cargoPath, "utf-8");
            cargo = cargo.replace(/^version = "[^"]*"/m, `version = "${v}"`);
            fs.writeFileSync(cargoPath, cargo);
            console.log("Bumped to", v);
          '

      - name: Install dependencies (ubuntu)
        if: matrix.settings.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            nasm cmake clang libclang-dev

      - name: Install build dependencies for boring-sys2 (macOS)
        if: matrix.settings.platform == 'macos-latest'
        run: brew install nasm cmake

      - name: Install build dependencies for boring-sys2 (Windows)
        if: matrix.settings.platform == 'windows-latest'
        shell: pwsh
        run: |
          choco install nasm --no-progress -y
          choco install llvm --no-progress -y
          # Make NASM + libclang reachable for the rest of the job
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify Cargo.lock matches
        shell: bash
        run: cargo check --manifest-path src-tauri/Cargo.toml --locked --quiet || (echo "Lockfile drift — run 'cargo update' locally and commit Cargo.lock"; exit 1)

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: WonderSuite ${{ steps.version.outputs.tag }}
          releaseBody: |
            ## WonderSuite ${{ steps.version.outputs.tag }}

            This is an automated release for WonderSuite.

            ### Downloads available:
            - **Windows**: `.msi` and `.exe` installers
            - **macOS**: `.app` and `.dmg` (Apple Silicon & Intel)
            - **Linux**: `.AppImage` and `.deb`

            ### Auto-Update
            Existing installs check `latest.json` on launch and prompt to update in-app — no manual download needed.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.settings.args }}
          includeUpdaterJson: true
