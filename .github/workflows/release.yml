name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        default: '0.1.0'
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.settings.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
          else
            RAW="${{ github.ref_name }}"
          fi
          # Strip an arbitrary number of leading 'v' (defends against both 'v0.1.1' and accidental 'vv0.1.1')
          VERSION="$RAW"
          while [[ "$VERSION" == v* ]]; do VERSION="${VERSION#v}"; done
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-].+)?$ ]]; then
            echo "::error::Resolved version '$VERSION' (from '$RAW') is not valid semver"
            exit 1
          fi
          echo "Using version: $VERSION (tag will be v$VERSION)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync version into manifests
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            for (const f of ["package.json", "src-tauri/tauri.conf.json"]) {
              const j = JSON.parse(fs.readFileSync(f, "utf-8"));
              j.version = v;
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + "\n");
            }
            const cargoPath = "src-tauri/Cargo.toml";
            let cargo = fs.readFileSync(cargoPath, "utf-8");
            cargo = cargo.replace(/^version = "[^"]*"/m, `version = "${v}"`);
            fs.writeFileSync(cargoPath, cargo);
            console.log("Bumped to", v);
          '

      - name: Install dependencies (ubuntu)
        if: matrix.settings.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            nasm cmake clang libclang-dev \
            libpcap-dev

      - name: Install build dependencies (macOS)
        if: matrix.settings.platform == 'macos-latest'
        run: |
          brew install nasm cmake
          # libpcap is preinstalled on macOS runners; nothing more needed for pnet.

      - name: Install build dependencies (Windows)
        if: matrix.settings.platform == 'windows-latest'
        shell: pwsh
        run: |
          choco install nasm --no-progress -y
          choco install llvm --no-progress -y
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          # No Npcap SDK install needed anymore — WinDivert is bundled in
          # resources/drivers/windivert/ and dlopened at runtime via libloading.

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify Cargo.lock matches
        shell: bash
        run: cargo check --manifest-path src-tauri/Cargo.toml --locked --quiet || (echo "Lockfile drift — run 'cargo update' locally and commit Cargo.lock"; exit 1)

      # Extract the body of the current release from CHANGELOG.md so the
      # GitHub release page + the in-app Changelog tab show real content
      # instead of the workflow's boilerplate. Falls back to a minimal
      # banner if the version isn't found.
      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "Falling back to tag without leading v"
            VERSION="${{ steps.version.outputs.tag }}"
            VERSION="${VERSION#v}"
          fi
          # Grab everything between `## [<version>]` and the next `## [` header.
          BODY="$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { capture = 0 }
            capture { print }
          ' CHANGELOG.md | sed -e '/^$/N;/^\n$/D')"
          if [ -z "$BODY" ]; then
            echo "::warning::No CHANGELOG section found for v$VERSION — using fallback body"
            BODY="Automated release for WonderSuite v$VERSION. See CHANGELOG.md for details."
          fi
          # Multiline output via heredoc
          {
            echo "body<<__END_OF_NOTES__"
            echo "$BODY"
            echo "__END_OF_NOTES__"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: WonderSuite ${{ steps.version.outputs.tag }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.settings.args }}
          includeUpdaterJson: true
