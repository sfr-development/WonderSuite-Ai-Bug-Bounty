<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>02 · Receipt</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="slide">
  <div class="brand-ribbon danger"><span class="dot"></span><span>Let's do the math</span></div>

  <div style="margin-top: 80px;">
    <div class="kicker danger">Burp Suite Pro — 5-person team</div>
    <div class="h2">What you're</div>
    <div class="h2"><span class="danger">actually paying.</span></div>
  </div>

  <div class="receipt">
    <div class="receipt-row"><span class="label">Burp Suite Pro</span><span class="val">$475</span></div>
    <div class="receipt-row"><span class="label">× 5 pentesters</span><span class="val">$2,375</span></div>
    <div class="receipt-row"><span class="label">× 3 years renewal</span><span class="val">$7,125</span></div>
    <div class="receipt-row total"><span class="label">3-year team cost</span><span class="val">$7,125</span></div>
  </div>

  <div class="receipt" style="margin-top: 36px;">
    <div class="receipt-row"><span class="label">WonderSuite</span><span class="val good">$0</span></div>
    <div class="receipt-row"><span class="label">MIT License · forever</span><span class="val good">$0</span></div>
    <div class="receipt-row you-pay"><span class="label">You save</span><span class="val">$7,125</span></div>
  </div>

  <div class="footer">
    <div class="footer-brand"><span class="square"></span><span>WonderSuite</span></div>
    <div class="footer-page">02 / 6</div>
  </div>
</div>
</body>
</html>
